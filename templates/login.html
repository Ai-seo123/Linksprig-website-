{% extends "base.html" %}

{% block title %}Login - LinkSprig{% endblock %}

{% block content %}
<style>
    .auth-container {
        min-height: calc(100vh - 100px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        background: #f8fafc;
    }

    .auth-card {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 24px;
        padding: 3rem;
        width: 100%;
        max-width: 480px;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
    }

    .auth-header {
        text-align: center;
        margin-bottom: 2.5rem;
    }

    .auth-logo {
        height: 80px;
        margin-bottom: 1.5rem;
    }

    .auth-title {
        font-size: 1.875rem;
        font-weight: 700;
        color: #1e293b;
        margin-bottom: 0.5rem;
    }

    .auth-subtitle {
        color: #64748b;
        font-size: 1rem;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-label {
        display: block;
        font-size: 0.875rem;
        font-weight: 600;
        color: #475569;
        margin-bottom: 0.5rem;
    }

    .form-control {
        width: 100%;
        padding: 0.75rem 1rem;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        background: white;
        transition: all 0.2s;
        font-size: 1rem;
    }

    .form-control:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }

    .btn-auth {
        width: 100%;
        padding: 0.875rem;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 30px;
        font-size: 1.125rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
        margin-top: 1rem;
        box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
    }

    .btn-auth:hover {
        background: #1d4ed8;
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
    }

    .auth-footer {
        text-align: center;
        margin-top: 2rem;
        color: #64748b;
        font-size: 0.95rem;
    }

    .auth-link {
        color: #2563eb;
        font-weight: 600;
        text-decoration: none;
    }

    .auth-link:hover {
        text-decoration: underline;
    }

    .forgot-password {
        display: block;
        text-align: right;
        font-size: 0.875rem;
        color: #64748b;
        text-decoration: none;
        margin-top: 0.5rem;
    }

    .forgot-password:hover {
        color: #2563eb;
    }
</style>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <img src="{{ url_for('static', filename='images/linksprig-logo.png') }}" alt="LinkSprig" class="auth-logo">
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Sign in to your dashboard</p>
        </div>

        <form action="" method="post" class="mb-3">
            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="you@email.com" required autofocus>
            </div>
            
            <div class="form-group mb-1">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Your password" required>
                <a href="{{ url_for('forgot_password') }}" class="forgot-password">
                    Forgot password?
                </a>
            </div>

            <button type="submit" class="btn-auth">
                Sign In
            </button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="{{ url_for('register') }}" class="auth-link">Register here</a>
        </div>
    </div>
</div>
{% endblock %}
