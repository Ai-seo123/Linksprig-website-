{% extends "base.html" %}

{% block title %}Forgot Password - LinkedIn Automation{% endblock %}

{% block content %}
<div class="container" style="max-width:480px; margin: auto;">
  <div class="card mt-5 shadow">
    <div class="card-header text-center" style="background: linear-gradient(90deg, #0a66c2 80%, #e6f0f9); color:#fff;">
      <h3><i class="fas fa-key me-2"></i>Forgot Your Password?</h3>
    </div>
    <div class="card-body pb-3">
      <p class="text-muted text-center mb-4">
        Enter your email address and we'll send you a link to reset your password.
      </p>

      <form action="{{ url_for('forgot_password') }}" method="post" class="mb-3">
        <div class="form-group mb-3">
          <label for="email" class="fw-bold">Email address</label>
          <input
            type="email"
            class="form-control"
            id="email"
            name="email"
            placeholder="you@email.com"
            required
            autofocus
          >
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-100">
          <i class="fas fa-paper-plane me-1"></i> Send Reset Link
        </button>
      </form>

      <div class="text-center text-muted mt-3">
        <a href="{{ url_for('login') }}" style="color:#0a66c2;">
          <i class="fas fa-arrow-left me-1"></i> Back to Login
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
